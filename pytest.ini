[pytest]
# PRECEPT Framework Test Configuration

# Test discovery - only PRECEPT tests
testpaths = tests/unit tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --ignore=tests/tests
    --ignore=tests/test_precept_workflow.py

# Markers
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for component interactions
    slow: Tests that take a long time to run
    requires_api: Tests that require OpenAI API access

# Async configuration
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = WARNING

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning
